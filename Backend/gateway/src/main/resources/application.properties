server.port=8080
spring.application.name=gateway
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Logging
logging.level.org.springframework.cloud.gateway=INFO

# User Service Route
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**, /api/users/**

# Course Service Route
spring.cloud.gateway.routes[1].id=course-service
spring.cloud.gateway.routes[1].uri=lb://COURSE-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/courses/**

# Order Service Route
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**, /api/payments/**, /api/enrollments/**, /api/coupons/**

# Assignment Service Route
spring.cloud.gateway.routes[3].id=assignment-service
spring.cloud.gateway.routes[3].uri=lb://ASSIGNMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/assignments/**, /api/quizzes/**

spring.cloud.gateway.routes[4].id=community-service
spring.cloud.gateway.routes[4].uri=lb://COMMUNITY-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/community/**

spring.cloud.gateway.routes[5].id=community-service-ws
spring.cloud.gateway.routes[5].uri=lb:ws://COMMUNITY-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/ws/**
