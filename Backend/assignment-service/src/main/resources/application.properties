server.port=8086
spring.application.name=assignment-service

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/miniproject_assignment
spring.datasource.username=pratikpatil
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Cross-Service OpenFeign Client Config (Timeout handling for quizzes and grading calls)
spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=5000
